baseURL = "https://npalladium.github.io/blog/"
languageCode = "en-us"
title = "npalladium"
theme = "hugo-xmin"
enableGitInfo = true

[frontmatter]
  # Dates: frontmatter field > git commit date > file mtime
  date     = ["date", ":git", ":fileModTime"]
  lastmod  = ["lastmod", ":git", ":fileModTime"]

[params]
  author     = "npalladium"
  footer     = "© 2026 npalladium"
  dateFormat = "2006-01-02"

[markup]
  [markup.highlight]
    codeFences  = true
    noClasses   = false   # emit class names; no colour without a highlight stylesheet
  [markup.goldmark.renderer]
    unsafe = true         # allow raw HTML in Markdown (needed for some LaTeX tricks)

[mediaTypes]
  [mediaTypes."application/atom+xml"]
    suffixes = ["xml"]

[outputFormats]
  [outputFormats.Atom]
    mediaType     = "application/atom+xml"
    baseName      = "atom"
    isPlainText   = false
    rel           = "alternate"
    isHTML        = false
    noUgly        = true

[outputs]
  home     = ["HTML"]
  section  = ["HTML", "RSS", "Atom"]
  page     = ["HTML"]
  taxonomy = ["HTML"]
  term     = ["HTML"]

[[menu.main]]
  name   = "Home"
  url    = "/"
  weight = 1
[[menu.main]]
  name   = "Posts"
  url    = "/posts/"
  weight = 2
[[menu.main]]
  name   = "About"
  url    = "/about/"
  weight = 3
